name: Publish Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --openssl-legacy-provider
      PUBLISH_DIR: pages-site
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci --no-audit --cache "$RUNNER_TEMP/npm-cache"

      - name: Build
        run: npm run build

      - name: Prepare site
        run: |
          set -euo pipefail
          rm -rf "$PUBLISH_DIR"
          mkdir -p "$PUBLISH_DIR"
          cp index.html "$PUBLISH_DIR/"
          cp -R assets dist "$PUBLISH_DIR/"

      - name: Publish to gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test -f "$PUBLISH_DIR/index.html"
          site="$(mktemp -d)"
          rsync -a --delete "$PUBLISH_DIR"/ "$site"/
          find "$site" -name '.DS_Store' -delete
          touch "$site/.nojekyll"

          cd "$site"
          git init -q
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish pages ${GITHUB_SHA::7}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages:gh-pages

      - name: Cleanup workspace
        if: always()
        run: |
          rm -rf "$PUBLISH_DIR" node_modules "$RUNNER_TEMP/npm-cache"
